{{- if .Values.cloudflared.enabled }}
{{- $secretName := .Values.cloudflared.existingSecretName | default (include "cloudflare-tunnel-operator.resourceName" (dict "suffix" "cloudflared-token" "context" $)) }}
{{- $secretNs := .Values.cloudflared.existingSecretNamespace | default .Release.Namespace }}
{{- if .Values.cloudflared.tunnelToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $secretNs }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "cloudflare-tunnel-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  token: {{ .Values.cloudflared.tunnelToken | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudflare-tunnel-operator.resourceName" (dict "suffix" "cloudflared" "context" $) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "cloudflare-tunnel-operator.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: cloudflared
spec:
  replicas: {{ .Values.cloudflared.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cloudflare-tunnel-operator.name" . }}
      app.kubernetes.io/component: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "cloudflare-tunnel-operator.name" . }}
        app.kubernetes.io/component: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: "{{ .Values.cloudflared.image.repository }}:{{ .Values.cloudflared.image.tag }}"
        imagePullPolicy: {{ .Values.cloudflared.image.pullPolicy }}
        args:
        - tunnel
        - --no-autoupdate
        - run
        - --token
        - $(TUNNEL_TOKEN)
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $secretName }}
              key: token
{{- end }}

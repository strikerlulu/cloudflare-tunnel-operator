apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "cloudflare-tunnel-operator.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - networking.strikerlulu.me
  resources:
  - tunnels
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.strikerlulu.me
  resources:
  - tunnels/finalizers
  verbs:
  - update
- apiGroups:
  - networking.strikerlulu.me
  resources:
  - tunnels/status
  verbs:
  - get
  - patch
  - update
